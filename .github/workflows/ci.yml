name: Calculator CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Get the code
        uses: actions/checkout@v4

      - name: Step 2 - Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Step 3 - Install pytest
        run: pip install pytest

      - name: Step 4 - Run tests
        run: pytest test_calculator.py -v
